<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cozy Weather</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#fdf2f8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CozyWeather" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <meta property="og:title" content="Cozy Weather" />
    <meta property="og:description" content="Tu pronóstico del tiempo más adorable, con datos de Open-Meteo y planes locales sin IA." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cozy-weather.vercel.app/" />
    <meta property="og:site_name" content="Cozy Weather" />
    <meta property="og:image" content="https://cozy-weather.vercel.app/og-image.png?v=9" />
    <meta property="og:image:secure_url" content="https://cozy-weather.vercel.app/og-image.png?v=9" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cozy Weather Preview" />

    <meta itemprop="name" content="Cozy Weather" />
    <meta itemprop="description" content="La app del tiempo más cozy, sin IA y sin cuentas." />
    <meta itemprop="image" content="https://cozy-weather.vercel.app/og-image.png?v=9" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cozy Weather" />
    <meta name="twitter:description" content="La app del tiempo más cozy, sin IA y sin cuentas." />
    <meta name="twitter:image" content="https://cozy-weather.vercel.app/og-image.png?v=9" />

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fdf2f8;
        overscroll-behavior-y: none;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #fbcfe8;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f9a8d4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(registrationError => {
              console.warn('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
